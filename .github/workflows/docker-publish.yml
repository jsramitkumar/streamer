name: Build & Push Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main               # build only (no push) on PRs for validation
  workflow_dispatch:       # allow manual runs from the Actions tab

env:
  # Override by adding a repo variable DOCKERHUB_USERNAME in Settings → Variables
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}

jobs:
  # Generate the timestamp tag once and share it across both build jobs
  prepare:
    name: Generate tags
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.ts.outputs.value }}
    steps:
      - name: Generate DDMMYYYY.HHMMSS timestamp
        id: ts
        run: echo "value=$(date -u +'%d%m%Y.%H%M%S')" >> "$GITHUB_OUTPUT"

  build-backend:
    name: Backend (Express + SPA)
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/streamer-backend:latest
            ${{ env.DOCKERHUB_USERNAME }}/streamer-backend:${{ needs.prepare.outputs.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ai:
    name: AI Service (YOLOv8)
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ai-service
          file: ai-service/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/streamer-ai:latest
            ${{ env.DOCKERHUB_USERNAME }}/streamer-ai:${{ needs.prepare.outputs.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
